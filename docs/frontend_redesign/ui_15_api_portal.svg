<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="1000" viewBox="0 0 1440 1000" font-family="Inter, system-ui, sans-serif">
  <defs><filter id="sh" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#1c1917" flood-opacity="0.06"/></filter></defs>
  <rect width="1440" height="1000" fill="#ffffff"/>
  <!-- HEADER -->
  <rect width="1440" height="56" fill="#fff"/><line x1="0" y1="56" x2="1440" y2="56" stroke="#e7e5e4"/>
  <rect x="24" y="15" width="26" height="26" rx="8" fill="#4f46e5"/><g stroke="#fff" stroke-width="1.4" fill="none"><circle cx="37" cy="24" r="1.9"/><circle cx="31" cy="34" r="1.9"/><circle cx="43" cy="34" r="1.9"/><path d="M37 26l-6 7M37 26l6 7M31.6 34h10.8"/></g>
  <text x="60" y="33" font-size="12" fill="#a8a29e">Developer / API Portal</text>
  <rect x="560" y="13" width="320" height="30" rx="8" fill="#f5f5f4" stroke="#e7e5e4"/><text x="578" y="32" font-size="12" fill="#a8a29e">Search endpoints, SDK…  ⌘K</text>
  <circle cx="1360" cy="28" r="14" fill="#fafaf9" stroke="#e7e5e4"/><circle cx="1404" cy="28" r="15" fill="#eef2ff" stroke="#c7d2fe"/><text x="1404" y="32" text-anchor="middle" font-size="12" font-weight="600" fill="#4f46e5">NH</text>

  <text x="40" y="94" font-size="24" font-weight="700" fill="#1c1917">Developer / API Portal</text>
  <text x="40" y="116" font-size="13" fill="#78716c">Programmatic access to Registry, swarm runs &amp; ops · OpenAPI-driven docs.</text>

  <!-- Left endpoint nav -->
  <g transform="translate(40,138)">
    <rect width="260" height="820" rx="14" fill="#fafaf9" stroke="#e7e5e4"/>
    <rect x="16" y="16" width="228" height="30" rx="8" fill="#fff" stroke="#e7e5e4"/><text x="30" y="36" font-size="10" fill="#a8a29e">Filter endpoints…</text>
    <text x="16" y="74" font-size="10" font-weight="700" letter-spacing="1" fill="#a8a29e">REGISTRY</text>
    <g transform="translate(16,82)" font-size="10">
      <rect width="40" height="18" rx="4" fill="#ecfdf5"/><text x="20" y="13" text-anchor="middle" fill="#047857" font-family="ui-monospace,monospace">GET</text><text x="50" y="13" fill="#44403c">/agents</text>
      <g transform="translate(0,26)"><rect width="40" height="18" rx="4" fill="#ecfdf5"/><text x="20" y="13" text-anchor="middle" fill="#047857" font-family="ui-monospace,monospace">GET</text><text x="50" y="13" fill="#44403c">/agents/{id}</text></g>
      <g transform="translate(0,52)"><rect width="40" height="18" rx="4" fill="#eef2ff"/><text x="20" y="13" text-anchor="middle" fill="#4338ca" font-family="ui-monospace,monospace">POST</text><text x="50" y="13" fill="#44403c">/proposals</text></g>
    </g>
    <text x="16" y="196" font-size="10" font-weight="700" letter-spacing="1" fill="#a8a29e">SWARMS</text>
    <g transform="translate(16,204)" font-size="10">
      <rect width="40" height="18" rx="4" fill="#eef2ff"/><text x="20" y="13" text-anchor="middle" fill="#4338ca" font-family="ui-monospace,monospace">POST</text><text x="50" y="13" fill="#1c1917" font-weight="600">/swarms/{id}/run</text>
      <g transform="translate(0,26)"><rect width="40" height="18" rx="4" fill="#ecfdf5"/><text x="20" y="13" text-anchor="middle" fill="#047857" font-family="ui-monospace,monospace">GET</text><text x="50" y="13" fill="#44403c">/runs/{id}</text></g>
      <g transform="translate(0,52)"><rect width="40" height="18" rx="4" fill="#ecfdf5"/><text x="20" y="13" text-anchor="middle" fill="#047857" font-family="ui-monospace,monospace">GET</text><text x="50" y="13" fill="#44403c">/runs/{id}/events</text></g>
    </g>
    <text x="16" y="320" font-size="10" font-weight="700" letter-spacing="1" fill="#a8a29e">OPS</text>
    <g transform="translate(16,328)" font-size="10">
      <rect width="40" height="18" rx="4" fill="#eef2ff"/><text x="20" y="13" text-anchor="middle" fill="#4338ca" font-family="ui-monospace,monospace">POST</text><text x="50" y="13" fill="#44403c">/rollouts</text>
      <g transform="translate(0,26)"><rect width="40" height="18" rx="4" fill="#fffbeb"/><text x="20" y="13" text-anchor="middle" fill="#b45309" font-family="ui-monospace,monospace">PUT</text><text x="50" y="13" fill="#44403c">/gates/{id}/approve</text></g>
    </g>
    <line x1="16" y1="400" x2="244" y2="400" stroke="#e7e5e4"/>
    <text x="16" y="424" font-size="11" font-weight="600" fill="#57534e">SDKs</text>
    <g transform="translate(16,432)" font-size="9" fill="#57534e"><rect width="70" height="24" rx="12" fill="#fff" stroke="#e7e5e4"/><text x="35" y="16" text-anchor="middle">Python</text><rect x="78" width="70" height="24" rx="12" fill="#fff" stroke="#e7e5e4"/><text x="113" y="16" text-anchor="middle">TypeScript</text><rect y="30" width="70" height="24" rx="12" fill="#fff" stroke="#e7e5e4"/><text x="35" y="46" text-anchor="middle">Go</text><rect x="78" y="30" width="70" height="24" rx="12" fill="#fff" stroke="#e7e5e4"/><text x="113" y="46" text-anchor="middle">cURL</text></g>
  </g>

  <!-- Center: endpoint doc -->
  <g transform="translate(320,138)">
    <rect width="700" height="820" rx="14" fill="#fff" stroke="#e7e5e4" filter="url(#sh)"/>
    <rect x="20" y="20" width="52" height="24" rx="6" fill="#eef2ff"/><text x="46" y="37" text-anchor="middle" font-size="11" font-family="ui-monospace,monospace" fill="#4338ca">POST</text>
    <text x="82" y="38" font-size="15" font-family="ui-monospace,monospace" fill="#1c1917">/v1/swarms/{id}/run</text>
    <rect x="560" y="20" width="120" height="24" rx="12" fill="#ecfdf5" stroke="#a7f3d0"/><text x="620" y="37" text-anchor="middle" font-size="10" fill="#047857">Requires: swarm:run</text>
    <text x="20" y="66" font-size="12" fill="#57534e">Start a swarm run with pinned common versions. Returns a run ID and SSE stream URL.</text>

    <!-- params -->
    <text x="20" y="98" font-size="12" font-weight="600" fill="#1c1917">Parameters</text>
    <rect x="20" y="108" width="660" height="86" rx="10" fill="#fafaf9" stroke="#e7e5e4"/>
    <g font-size="10" font-family="ui-monospace,monospace">
      <text x="34" y="130" fill="#1c1917">id</text><text x="120" y="130" fill="#7c3aed">string</text><text x="220" y="130" fill="#dc2626">required</text><text x="320" y="130" font-family="Inter" fill="#78716c">Swarm identifier (path)</text>
      <text x="34" y="152" fill="#1c1917">inputs</text><text x="120" y="152" fill="#7c3aed">object</text><text x="220" y="152" fill="#dc2626">required</text><text x="320" y="152" font-family="Inter" fill="#78716c">Goal-specific input payload</text>
      <text x="34" y="174" fill="#1c1917">idempotency_key</text><text x="180" y="174" fill="#7c3aed">string</text><text x="280" y="174" fill="#a8a29e">optional</text><text x="380" y="174" font-family="Inter" fill="#78716c">Dedupe repeat requests</text>
    </g>

    <!-- request example -->
    <text x="20" y="222" font-size="12" font-weight="600" fill="#1c1917">Request</text>
    <rect x="20" y="232" width="660" height="150" rx="10" fill="#0f172a"/>
    <g font-family="ui-monospace,monospace" font-size="11">
      <text x="34" y="256" fill="#94a3b8">$ curl -X POST https://api.caso.local/v1/swarms/\</text>
      <text x="34" y="274" fill="#94a3b8">   trading-alpha/run \</text>
      <text x="34" y="292" fill="#94a3b8">  -H </text><text x="70" y="292" fill="#86efac">"Authorization: Bearer $CASO_TOKEN"</text>
      <text x="34" y="310" fill="#94a3b8">  -H </text><text x="70" y="310" fill="#86efac">"Content-Type: application/json"</text>
      <text x="34" y="328" fill="#94a3b8">  -d </text><text x="70" y="328" fill="#fbbf24">'{"inputs":{"symbol":"BTC"}}'</text>
      <text x="34" y="358" fill="#64748b"># scopes enforced server-side · token never in URL</text>
    </g>
    <rect x="600" y="240" width="70" height="22" rx="11" fill="#1e293b"/><text x="635" y="255" text-anchor="middle" font-size="9" fill="#cbd5e1">Copy</text>

    <!-- response -->
    <text x="20" y="410" font-size="12" font-weight="600" fill="#1c1917">Response  <tspan fill="#059669">200 OK</tspan></text>
    <rect x="20" y="420" width="660" height="140" rx="10" fill="#0f172a"/>
    <g font-family="ui-monospace,monospace" font-size="11">
      <text x="34" y="444" fill="#cbd5e1">{</text>
      <text x="50" y="462" fill="#7dd3fc">"run_id"</text><text x="110" y="462" fill="#cbd5e1">: </text><text x="122" y="462" fill="#86efac">"run-4421"</text><text x="200" y="462" fill="#cbd5e1">,</text>
      <text x="50" y="480" fill="#7dd3fc">"status"</text><text x="110" y="480" fill="#cbd5e1">: </text><text x="122" y="480" fill="#86efac">"queued"</text><text x="190" y="480" fill="#cbd5e1">,</text>
      <text x="50" y="498" fill="#7dd3fc">"events_url"</text><text x="140" y="498" fill="#cbd5e1">: </text><text x="152" y="498" fill="#86efac">"/v1/runs/run-4421/events"</text><text x="360" y="498" fill="#cbd5e1">,</text>
      <text x="50" y="516" fill="#7dd3fc">"pinned_commons"</text><text x="180" y="516" fill="#cbd5e1">: [</text><text x="210" y="516" fill="#86efac">"VerifierNode@3.0"</text><text x="360" y="516" fill="#cbd5e1">]</text>
      <text x="34" y="534" fill="#cbd5e1">}</text>
    </g>
    <!-- try it -->
    <rect x="20" y="580" width="150" height="34" rx="17" fill="#1c1917"/><text x="95" y="602" text-anchor="middle" font-size="12" fill="#fff">Try it in sandbox</text>
    <rect x="180" y="580" width="150" height="34" rx="17" fill="#fff" stroke="#e7e5e4"/><text x="255" y="602" text-anchor="middle" font-size="12" fill="#57534e">View OpenAPI spec</text>
    <text x="20" y="644" font-size="10" fill="#a8a29e">Docs generated from server OpenAPI · scopes/rate limits authoritative server-side.</text>
  </g>

  <!-- Right: keys + usage + webhooks -->
  <g transform="translate(1040,138)">
    <rect width="360" height="400" rx="14" fill="#fff" stroke="#e7e5e4" filter="url(#sh)"/>
    <text x="20" y="30" font-size="13" font-weight="600" fill="#1c1917">API Keys &amp; Scopes</text>
    <rect x="240" y="14" width="100" height="24" rx="12" fill="#1c1917"/><text x="290" y="30" text-anchor="middle" font-size="10" fill="#fff">+ Create key</text>
    <g transform="translate(20,44)">
      <rect width="320" height="72" rx="10" fill="#fafaf9" stroke="#e7e5e4"/>
      <text x="14" y="24" font-size="11" font-weight="600" fill="#1c1917">prod-key</text>
      <text x="14" y="42" font-size="10" font-family="ui-monospace,monospace" fill="#a8a29e">caso_sk_••••••••4f2a</text>
      <g transform="translate(14,50)" font-size="8"><rect width="60" height="16" rx="8" fill="#eef2ff"/><text x="30" y="11" text-anchor="middle" fill="#4f46e5">swarm:run</text><rect x="66" width="66" height="16" rx="8" fill="#eef2ff"/><text x="99" y="11" text-anchor="middle" fill="#4f46e5">registry:read</text></g>
      <text x="250" y="24" font-size="9" fill="#4f46e5">Rotate</text><text x="250" y="42" font-size="9" fill="#dc2626">Revoke</text>
    </g>
    <g transform="translate(20,128)">
      <rect width="320" height="60" rx="10" fill="#fafaf9" stroke="#e7e5e4"/>
      <text x="14" y="24" font-size="11" font-weight="600" fill="#1c1917">ci-readonly</text>
      <text x="14" y="42" font-size="10" font-family="ui-monospace,monospace" fill="#a8a29e">caso_sk_••••••••9b13</text>
      <text x="250" y="24" font-size="9" fill="#4f46e5">Rotate</text><text x="250" y="42" font-size="9" fill="#dc2626">Revoke</text>
    </g>
    <line x1="20" y1="204" x2="340" y2="204" stroke="#f5f5f4"/>
    <text x="20" y="228" font-size="13" font-weight="600" fill="#1c1917">Rate Limit &amp; Usage</text>
    <g transform="translate(20,240)" font-size="10" fill="#57534e">
      <text x="0" y="14">Requests today</text><text x="300" y="14" text-anchor="end" fill="#1c1917">8,420 / 50k</text>
      <rect y="20" width="320" height="8" rx="4" fill="#f5f5f4"/><rect y="20" width="54" height="8" rx="4" fill="#4f46e5"/>
      <text x="0" y="52">Error rate</text><text x="300" y="52" text-anchor="end" fill="#059669">0.3%</text>
      <text x="0" y="76">p95 latency</text><text x="300" y="76" text-anchor="end" fill="#1c1917">240ms</text>
    </g>
    <text x="20" y="370" font-size="9" fill="#a8a29e">Keys shown once at creation · scopes bound server-side.</text>
  </g>
  <!-- webhooks -->
  <g transform="translate(1040,554)">
    <rect width="360" height="404" rx="14" fill="#fafaf9" stroke="#e7e5e4"/>
    <text x="20" y="30" font-size="13" font-weight="600" fill="#1c1917">Webhooks</text>
    <rect x="240" y="14" width="100" height="24" rx="12" fill="#1c1917"/><text x="290" y="30" text-anchor="middle" font-size="10" fill="#fff">+ Endpoint</text>
    <g transform="translate(20,44)">
      <rect width="320" height="70" rx="10" fill="#fff" stroke="#e7e5e4"/>
      <text x="14" y="24" font-size="10" font-family="ui-monospace,monospace" fill="#1c1917">https://hooks.mysite/caso</text>
      <g transform="translate(14,32)" font-size="8" fill="#57534e"><rect width="70" height="16" rx="8" fill="#f5f5f4"/><text x="35" y="11" text-anchor="middle">run.completed</text><rect x="76" width="66" height="16" rx="8" fill="#f5f5f4"/><text x="109" y="11" text-anchor="middle">rollout.done</text></g>
      <rect x="14" y="52" width="70" height="14" rx="7" fill="#ecfdf5"/><text x="49" y="62" text-anchor="middle" font-size="8" fill="#047857">Active</text>
      <text x="250" y="60" font-size="9" fill="#4f46e5">Test · Logs</text>
    </g>
    <text x="20" y="146" font-size="11" font-weight="600" fill="#57534e">Recent deliveries</text>
    <g transform="translate(20,158)" font-size="9" fill="#57534e" font-family="ui-monospace,monospace">
      <text x="0" y="14">04:12 run.completed</text><rect x="270" y="2" width="40" height="14" rx="7" fill="#ecfdf5"/><text x="290" y="12" text-anchor="middle" font-family="Inter" fill="#047857">200</text>
      <text x="0" y="40">03:58 rollout.done</text><rect x="270" y="28" width="40" height="14" rx="7" fill="#ecfdf5"/><text x="290" y="38" text-anchor="middle" font-family="Inter" fill="#047857">200</text>
      <text x="0" y="66">03:44 run.completed</text><rect x="270" y="54" width="40" height="14" rx="7" fill="#fef2f2"/><text x="290" y="64" text-anchor="middle" font-family="Inter" fill="#dc2626">500</text>
    </g>
    <text x="20" y="270" font-size="11" font-weight="600" fill="#57534e">Signing secret</text>
    <rect x="20" y="280" width="320" height="30" rx="8" fill="#fff" stroke="#e7e5e4"/><text x="34" y="300" font-size="10" font-family="ui-monospace,monospace" fill="#a8a29e">whsec_••••••••  (HMAC-SHA256)</text>
    <text x="20" y="340" font-size="9" fill="#a8a29e">Verify signatures · payloads redacted · retries w/ backoff.</text>
  </g>
  <a href="ui_00_menu.svg" target="_top" aria-label="Open application menu"><title>Open application menu</title><rect x="16" y="8" width="100" height="42" fill="transparent" pointer-events="all"/></a>
</svg>
