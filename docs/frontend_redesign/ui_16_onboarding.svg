<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="1000" viewBox="0 0 1440 1000" font-family="Inter, system-ui, sans-serif">
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#1c1917" flood-opacity="0.06"/></filter>
    <linearGradient id="hero16" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#4f46e5"/><stop offset="1" stop-color="#7c3aed"/></linearGradient>
  </defs>
  <rect width="1440" height="1000" fill="#ffffff"/>

  <!-- minimal header (onboarding has no full nav) -->
  <rect width="1440" height="56" fill="#fff"/><line x1="0" y1="56" x2="1440" y2="56" stroke="#e7e5e4"/>
  <rect x="24" y="15" width="26" height="26" rx="8" fill="#4f46e5"/><g stroke="#fff" stroke-width="1.4" fill="none"><circle cx="37" cy="24" r="1.9"/><circle cx="31" cy="34" r="1.9"/><circle cx="43" cy="34" r="1.9"/><path d="M37 26l-6 7M37 26l6 7M31.6 34h10.8"/></g>
  <text x="60" y="33" font-size="14" font-weight="600" fill="#1c1917">common-agent-swarm-ops</text>
  <text x="1400" y="33" text-anchor="end" font-size="12" fill="#4f46e5">Skip for now →</text>

  <!-- Progress stepper -->
  <g transform="translate(340,80)">
    <rect width="760" height="40" rx="8" fill="#fafaf9" stroke="#e7e5e4"/>
    <g font-size="10">
      <circle cx="80" cy="20" r="10" fill="#4f46e5"/><text x="80" y="24" text-anchor="middle" fill="#fff" font-weight="700">1</text><text x="80" y="38" text-anchor="middle" fill="#4f46e5" font-weight="600">Workspace</text>
      <line x1="90" y1="20" x2="210" y2="20" stroke="#c7d2fe" stroke-width="2"/>
      <circle cx="220" cy="20" r="10" fill="#4f46e5"/><text x="220" y="24" text-anchor="middle" fill="#fff" font-weight="700">2</text><text x="220" y="38" text-anchor="middle" fill="#4f46e5" font-weight="600">Provider</text>
      <line x1="230" y1="20" x2="350" y2="20" stroke="#c7d2fe" stroke-width="2"/>
      <circle cx="360" cy="20" r="10" fill="#eef2ff" stroke="#c7d2fe" stroke-width="2"/><text x="360" y="24" text-anchor="middle" fill="#4f46e5" font-weight="700">3</text><text x="360" y="38" text-anchor="middle" fill="#78716c">Common</text>
      <line x1="370" y1="20" x2="490" y2="20" stroke="#e7e5e4" stroke-width="2"/>
      <circle cx="500" cy="20" r="10" fill="#f5f5f4" stroke="#e7e5e4" stroke-width="2"/><text x="500" y="24" text-anchor="middle" fill="#a8a29e">4</text><text x="500" y="38" text-anchor="middle" fill="#a8a29e">First Swarm</text>
      <line x1="510" y1="20" x2="630" y2="20" stroke="#e7e5e4" stroke-width="2"/>
      <circle cx="640" cy="20" r="10" fill="#f5f5f4" stroke="#e7e5e4" stroke-width="2"/><text x="640" y="24" text-anchor="middle" fill="#a8a29e">5</text><text x="640" y="38" text-anchor="middle" fill="#a8a29e">Ready!</text>
    </g>
  </g>

  <!-- Main content: Step 3 — Pick Commons -->
  <g transform="translate(200,148)">
    <rect width="1040" height="780" rx="20" fill="#fff" stroke="#e7e5e4" filter="url(#sh)"/>
    <!-- step header -->
    <text x="40" y="48" font-size="22" font-weight="700" fill="#1c1917">Select Your Common Agents</text>
    <text x="40" y="72" font-size="13" fill="#78716c">Start with battle-tested commons from the Registry. You can always add more later.</text>

    <!-- search -->
    <rect x="40" y="92" width="500" height="36" rx="10" fill="#fafaf9" stroke="#e7e5e4"/>
    <circle cx="60" cy="110" r="6" fill="none" stroke="#a8a29e" stroke-width="1.4"/><path d="M64 114l4 4" stroke="#a8a29e" stroke-width="1.4"/>
    <text x="76" y="114" font-size="12" fill="#a8a29e">Search or describe what you need…</text>

    <!-- filter chips -->
    <g transform="translate(40,140)" font-size="10" fill="#57534e">
      <rect width="66" height="24" rx="12" fill="#eef2ff" stroke="#c7d2fe"/><text x="33" y="16" text-anchor="middle" fill="#4f46e5">All (87)</text>
      <rect x="74" width="80" height="24" rx="12" fill="#fff" stroke="#e7e5e4"/><text x="114" y="16" text-anchor="middle">Data &amp; ETL</text>
      <rect x="162" width="90" height="24" rx="12" fill="#fff" stroke="#e7e5e4"/><text x="207" y="16" text-anchor="middle">Verification</text>
      <rect x="260" width="70" height="24" rx="12" fill="#fff" stroke="#e7e5e4"/><text x="295" y="16" text-anchor="middle">Analysis</text>
      <rect x="338" width="80" height="24" rx="12" fill="#fff" stroke="#e7e5e4"/><text x="378" y="16" text-anchor="middle">Synthesis</text>
    </g>

    <!-- agent pick cards 2x3 grid -->
    <g transform="translate(40,180)">
      <!-- card selected -->
      <g><rect width="300" height="100" rx="14" fill="#eef2ff" stroke="#4f46e5" stroke-width="2"/>
        <circle cx="278" cy="20" r="10" fill="#4f46e5"/><path d="M274 20l3 3 6-6" stroke="#fff" stroke-width="1.6" fill="none"/>
        <rect x="16" y="16" width="32" height="32" rx="9" fill="#fff"/><circle cx="32" cy="32" r="8" fill="none" stroke="#4f46e5" stroke-width="1.4"/>
        <text x="56" y="28" font-size="12" font-weight="600" fill="#1c1917">DataFetcher</text>
        <rect x="56" y="36" width="80" height="16" rx="8" fill="#eef2ff"/><text x="62" y="48" font-size="8" fill="#4f46e5">Common v2.1 · 94%</text>
        <text x="16" y="72" font-size="10" fill="#57534e">Multi-source data ingestion with retries.</text>
        <text x="16" y="88" font-size="9" fill="#059669">12.4k runs · used in 248 swarms</text>
      </g>
      <!-- card selected -->
      <g transform="translate(316,0)"><rect width="300" height="100" rx="14" fill="#eef2ff" stroke="#4f46e5" stroke-width="2"/>
        <circle cx="278" cy="20" r="10" fill="#4f46e5"/><path d="M274 20l3 3 6-6" stroke="#fff" stroke-width="1.6" fill="none"/>
        <rect x="16" y="16" width="32" height="32" rx="9" fill="#fff"/><path d="M26 32l4 4 8-8" stroke="#059669" stroke-width="1.4" fill="none"/>
        <text x="56" y="28" font-size="12" font-weight="600" fill="#1c1917">VerifierNode</text>
        <rect x="56" y="36" width="80" height="16" rx="8" fill="#ecfdf5"/><text x="62" y="48" font-size="8" fill="#059669">Common v3.0 · 97%</text>
        <text x="16" y="72" font-size="10" fill="#57534e">Iterative verification with rubric.</text>
        <text x="16" y="88" font-size="9" fill="#059669">31.2k runs · used in 47 swarms</text>
      </g>
      <!-- card unselected -->
      <g transform="translate(632,0)"><rect width="300" height="100" rx="14" fill="#fff" stroke="#e7e5e4"/>
        <circle cx="278" cy="20" r="10" fill="#f5f5f4" stroke="#e7e5e4"/>
        <rect x="16" y="16" width="32" height="32" rx="9" fill="#fafaf9"/><circle cx="32" cy="32" r="8" fill="none" stroke="#78716c" stroke-width="1.4"/>
        <text x="56" y="28" font-size="12" font-weight="600" fill="#1c1917">SentimentAgent</text>
        <rect x="56" y="36" width="80" height="16" rx="8" fill="#eef2ff"/><text x="62" y="48" font-size="8" fill="#4f46e5">Common v1.9 · 91%</text>
        <text x="16" y="72" font-size="10" fill="#57534e">Market sentiment from multiple feeds.</text>
        <text x="16" y="88" font-size="9" fill="#78716c">8.7k runs · used in 640 swarms</text>
      </g>
      <!-- row 2 -->
      <g transform="translate(0,116)"><rect width="300" height="100" rx="14" fill="#eef2ff" stroke="#4f46e5" stroke-width="2"/>
        <circle cx="278" cy="20" r="10" fill="#4f46e5"/><path d="M274 20l3 3 6-6" stroke="#fff" stroke-width="1.6" fill="none"/>
        <rect x="16" y="16" width="32" height="32" rx="9" fill="#fff"/><circle cx="32" cy="32" r="8" fill="none" stroke="#4f46e5" stroke-width="1.4"/>
        <text x="56" y="28" font-size="12" font-weight="600" fill="#1c1917">SynthesisAgent</text>
        <rect x="56" y="36" width="80" height="16" rx="8" fill="#eef2ff"/><text x="62" y="48" font-size="8" fill="#4f46e5">Common v2.2 · 93%</text>
        <text x="16" y="72" font-size="10" fill="#57534e">Consolidate multi-source outputs.</text>
        <text x="16" y="88" font-size="9" fill="#059669">6.1k runs · used in 189 swarms</text>
      </g>
      <g transform="translate(316,116)"><rect width="300" height="100" rx="14" fill="#fff" stroke="#e7e5e4"/>
        <circle cx="278" cy="20" r="10" fill="#f5f5f4" stroke="#e7e5e4"/>
        <rect x="16" y="16" width="32" height="32" rx="9" fill="#fafaf9"/><circle cx="32" cy="32" r="8" fill="none" stroke="#78716c" stroke-width="1.4"/>
        <text x="56" y="28" font-size="12" font-weight="600" fill="#1c1917">ContentDirector</text>
        <rect x="56" y="36" width="80" height="16" rx="8" fill="#eef2ff"/><text x="62" y="48" font-size="8" fill="#4f46e5">Common v1.8 · 91%</text>
        <text x="16" y="72" font-size="10" fill="#57534e">Creative strategy for cinematic flows.</text>
        <text x="16" y="88" font-size="9" fill="#78716c">8.7k runs · used in 640 swarms</text>
      </g>
      <g transform="translate(632,116)"><rect width="300" height="100" rx="14" fill="#fff" stroke="#e7e5e4"/>
        <circle cx="278" cy="20" r="10" fill="#f5f5f4" stroke="#e7e5e4"/>
        <rect x="16" y="16" width="32" height="32" rx="9" fill="#fafaf9"/><circle cx="32" cy="32" r="8" fill="none" stroke="#78716c" stroke-width="1.4"/>
        <text x="56" y="28" font-size="12" font-weight="600" fill="#1c1917">MarketPredictor</text>
        <rect x="56" y="36" width="80" height="16" rx="8" fill="#eef2ff"/><text x="62" y="48" font-size="8" fill="#4f46e5">Common v2.0 · 92%</text>
        <text x="16" y="72" font-size="10" fill="#57534e">Price movement prediction engine.</text>
        <text x="16" y="88" font-size="9" fill="#78716c">4.2k runs · used in 312 swarms</text>
      </g>
    </g>

    <!-- summary strip -->
    <g transform="translate(40,510)">
      <rect width="960" height="50" rx="12" fill="#eef2ff" stroke="#c7d2fe"/>
      <text x="20" y="30" font-size="12" fill="#4338ca" font-weight="600">3 commons selected</text>
      <text x="200" y="30" font-size="11" fill="#57534e">DataFetcher · VerifierNode · SynthesisAgent</text>
      <text x="920" y="30" text-anchor="end" font-size="11" fill="#4f46e5">Clear all</text>
    </g>

    <!-- Recommended pattern -->
    <text x="40" y="600" font-size="14" font-weight="600" fill="#1c1917">Recommended Pattern for your selections</text>
    <g transform="translate(40,614)">
      <rect width="960" height="80" rx="14" fill="#f5f3ff" stroke="#ddd6fe"/>
      <rect x="20" y="20" width="40" height="40" rx="11" fill="#fff"/><text x="40" y="46" text-anchor="middle" font-size="18" fill="#7c3aed">⊞</text>
      <text x="76" y="34" font-size="13" font-weight="600" fill="#1c1917">Parallel Independent + Verification Loop v1.4</text>
      <text x="76" y="54" font-size="11" fill="#57534e">Fits your 3 selected commons perfectly · 94% success · 23% token saving.</text>
      <text x="76" y="72" font-size="10" fill="#059669">Will be pre-loaded in your first canvas.</text>
      <rect x="780" y="24" width="150" height="32" rx="16" fill="#7c3aed"/><text x="855" y="44" text-anchor="middle" font-size="11" fill="#fff">Use this pattern</text>
    </g>

    <!-- footer actions -->
    <g transform="translate(40,720)">
      <rect x="720" width="140" height="40" rx="20" fill="#1c1917"/><text x="790" y="25" text-anchor="middle" font-size="13" fill="#fff" font-weight="500">Next →</text>
      <rect x="562" width="140" height="40" rx="20" fill="#fff" stroke="#e7e5e4"/><text x="632" y="25" text-anchor="middle" font-size="13" fill="#57534e">← Back</text>
      <text x="0" y="28" font-size="11" fill="#a8a29e">Step 3 of 5 · You can always adjust later in Registry Hub.</text>
    </g>
  </g>
</svg>
