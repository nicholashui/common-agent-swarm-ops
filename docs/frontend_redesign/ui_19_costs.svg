<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="1000" viewBox="0 0 1440 1000" font-family="Inter, system-ui, sans-serif">
  <defs><filter id="sh" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#1c1917" flood-opacity="0.06"/></filter></defs>
  <rect width="1440" height="1000" fill="#ffffff"/>
  <!-- HEADER -->
  <rect width="1440" height="56" fill="#fff"/><line x1="0" y1="56" x2="1440" y2="56" stroke="#e7e5e4"/>
  <rect x="24" y="15" width="26" height="26" rx="8" fill="#4f46e5"/><g stroke="#fff" stroke-width="1.4" fill="none"><circle cx="37" cy="24" r="1.9"/><circle cx="31" cy="34" r="1.9"/><circle cx="43" cy="34" r="1.9"/><path d="M37 26l-6 7M37 26l6 7M31.6 34h10.8"/></g>
  <text x="60" y="33" font-size="12" fill="#a8a29e">Cost &amp; Token Analytics</text>
  <rect x="560" y="13" width="320" height="30" rx="8" fill="#f5f5f4" stroke="#e7e5e4"/><text x="578" y="32" font-size="12" fill="#a8a29e">Search swarm, agent, period…  ⌘K</text>
  <circle cx="1360" cy="28" r="14" fill="#fafaf9" stroke="#e7e5e4"/><circle cx="1404" cy="28" r="15" fill="#eef2ff" stroke="#c7d2fe"/><text x="1404" y="32" text-anchor="middle" font-size="12" font-weight="600" fill="#4f46e5">NH</text>

  <text x="40" y="94" font-size="24" font-weight="700" fill="#1c1917">Cost &amp; Token Analytics</text>
  <text x="40" y="116" font-size="13" fill="#78716c">Token usage, cost attribution, budget alerts &amp; commons savings impact.</text>
  <g transform="translate(1120,78)"><rect width="120" height="28" rx="14" fill="#fff" stroke="#e7e5e4"/><text x="60" y="18" text-anchor="middle" font-size="11" fill="#57534e">Last 30 days ▾</text></g>
  <g transform="translate(1260,78)"><rect width="140" height="28" rx="14" fill="#1c1917"/><text x="70" y="18" text-anchor="middle" font-size="11" fill="#fff">Export report</text></g>

  <!-- KPI scorecards -->
  <g transform="translate(40,134)">
    <rect width="256" height="100" rx="14" fill="#fff" stroke="#e7e5e4" filter="url(#sh)"/><text x="20" y="28" font-size="11" fill="#78716c">Total spend (30d)</text><text x="20" y="66" font-size="30" font-weight="700" fill="#1c1917">$1,247</text><text x="20" y="88" font-size="10" fill="#059669">↓ 12% vs last month</text>
    <g transform="translate(272,0)"><rect width="256" height="100" rx="14" fill="#fff" stroke="#e7e5e4" filter="url(#sh)"/><text x="20" y="28" font-size="11" fill="#78716c">Total tokens</text><text x="20" y="66" font-size="30" font-weight="700" fill="#1c1917">4.2M</text><text x="20" y="88" font-size="10" fill="#78716c">avg 640/run</text></g>
    <g transform="translate(544,0)"><rect width="256" height="100" rx="14" fill="#fff" stroke="#e7e5e4" filter="url(#sh)"/><text x="20" y="28" font-size="11" fill="#78716c">Savings from commons</text><text x="20" y="66" font-size="30" font-weight="700" fill="#059669">$412</text><text x="20" y="88" font-size="10" fill="#059669">+34% vs rolling to custom</text></g>
    <g transform="translate(816,0)"><rect width="256" height="100" rx="14" fill="#fff" stroke="#e7e5e4" filter="url(#sh)"/><text x="20" y="28" font-size="11" fill="#78716c">Cost / successful run</text><text x="20" y="66" font-size="30" font-weight="700" fill="#1c1917">$0.09</text><text x="20" y="88" font-size="10" fill="#059669">↓ 8% efficiency gain</text></g>
    <g transform="translate(1088,0)"><rect width="232" height="100" rx="14" fill="#fff" stroke="#fde68a" filter="url(#sh)"/><text x="20" y="28" font-size="11" fill="#78716c">Budget utilization</text><text x="20" y="66" font-size="30" font-weight="700" fill="#b45309">62%</text><text x="20" y="88" font-size="10" fill="#78716c">of $2k monthly limit</text></g>
  </g>

  <!-- Cost trend chart -->
  <g transform="translate(40,260)">
    <rect width="820" height="260" rx="14" fill="#fff" stroke="#e7e5e4" filter="url(#sh)"/>
    <text x="20" y="30" font-size="14" font-weight="600" fill="#1c1917">Cost Trend</text>
    <g font-size="9" fill="#78716c"><text x="620" y="30">■ Total spend</text><text x="620" y="46" fill="#4f46e5">■ If no commons (estimated)</text><text x="620" y="62" fill="#059669">■ Savings</text></g>
    <!-- axes -->
    <line x1="60" y1="80" x2="60" y2="230" stroke="#e7e5e4"/><line x1="60" y1="230" x2="780" y2="230" stroke="#e7e5e4"/>
    <g font-size="8" fill="#a8a29e"><text x="60" y="240">Jul 1</text><text x="180" y="240">Jul 5</text><text x="310" y="240">Jul 10</text><text x="440" y="240">Jul 15</text><text x="570" y="240">Jul 18</text><text x="700" y="240">Jul 20</text></g>
    <!-- cost line -->
    <polyline points="60,200 130,192 200,188 270,196 340,184 410,180 480,172 550,168 620,160 690,156 760,150" fill="none" stroke="#1c1917" stroke-width="2"/>
    <!-- no-commons estimate (higher) -->
    <polyline points="60,180 130,168 200,162 270,172 340,152 410,146 480,134 550,128 620,120 690,112 760,104" fill="none" stroke="#4f46e5" stroke-width="1.5" stroke-dasharray="4 3"/>
    <!-- savings area between -->
    <polygon points="60,200 130,192 200,188 270,196 340,184 410,180 480,172 550,168 620,160 690,156 760,150 760,104 690,112 620,120 550,128 480,134 410,146 340,152 270,172 200,162 130,168 60,180" fill="#10b981" fill-opacity="0.12"/>
  </g>

  <!-- Cost breakdown by swarm / agent -->
  <g transform="translate(880,260)">
    <rect width="480" height="260" rx="14" fill="#fff" stroke="#e7e5e4" filter="url(#sh)"/>
    <text x="20" y="30" font-size="14" font-weight="600" fill="#1c1917">Cost by Swarm</text>
    <g transform="translate(20,48)">
      <!-- bar chart horizontal -->
      <text x="0" y="14" font-size="10" fill="#1c1917">TradingResearch α</text><rect x="180" y="4" width="260" height="12" rx="3" fill="#f5f5f4"/><rect x="180" y="4" width="180" height="12" rx="3" fill="#4f46e5"/><text x="448" y="14" font-size="9" fill="#1c1917">$482</text>
      <text x="0" y="42" font-size="10" fill="#1c1917">ContentPipeline β</text><rect x="180" y="32" width="260" height="12" rx="3" fill="#f5f5f4"/><rect x="180" y="32" width="130" height="12" rx="3" fill="#7c3aed"/><text x="448" y="42" font-size="9" fill="#1c1917">$348</text>
      <text x="0" y="70" font-size="10" fill="#1c1917">DSE Tutor Fleet</text><rect x="180" y="60" width="260" height="12" rx="3" fill="#f5f5f4"/><rect x="180" y="60" width="90" height="12" rx="3" fill="#10b981"/><text x="448" y="70" font-size="9" fill="#1c1917">$231</text>
      <text x="0" y="98" font-size="10" fill="#1c1917">LegacyModernizer</text><rect x="180" y="88" width="260" height="12" rx="3" fill="#f5f5f4"/><rect x="180" y="88" width="50" height="12" rx="3" fill="#f59e0b"/><text x="448" y="98" font-size="9" fill="#1c1917">$112</text>
      <text x="0" y="126" font-size="10" fill="#1c1917">Others (4)</text><rect x="180" y="116" width="260" height="12" rx="3" fill="#f5f5f4"/><rect x="180" y="116" width="30" height="12" rx="3" fill="#a8a29e"/><text x="448" y="126" font-size="9" fill="#1c1917">$74</text>
    </g>
    <text x="20" y="234" font-size="10" fill="#a8a29e">Click swarm → drill to per-agent costs · token breakdown (input/output/tool calls).</text>
  </g>

  <!-- Token heat map + per-agent -->
  <g transform="translate(40,540)">
    <rect width="820" height="280" rx="14" fill="#fff" stroke="#e7e5e4" filter="url(#sh)"/>
    <text x="20" y="30" font-size="14" font-weight="600" fill="#1c1917">Token Usage by Agent</text>
    <g font-size="10" fill="#a8a29e"><text x="20" y="56">AGENT</text><text x="240" y="56">INPUT</text><text x="340" y="56">OUTPUT</text><text x="440" y="56">TOOL</text><text x="530" y="56">TOTAL</text><text x="620" y="56">COST</text><text x="710" y="56">EFFICIENCY</text></g>
    <line x1="16" y1="64" x2="804" y2="64" stroke="#f5f5f4"/>
    <g font-size="11" fill="#44403c">
      <g transform="translate(0,74)"><text x="20" y="16" fill="#1c1917" font-weight="500">DataFetcher v2.1</text><text x="240" y="16">320</text><text x="340" y="16">280</text><text x="440" y="16">12</text><text x="530" y="16" font-weight="600">612</text><text x="620" y="16">$0.02</text><rect x="702" y="4" width="70" height="16" rx="8" fill="#ecfdf5"/><text x="737" y="16" text-anchor="middle" font-size="8" fill="#047857">Efficient</text><line x1="16" y1="30" x2="804" y2="30" stroke="#f5f5f4"/></g>
      <g transform="translate(0,112)"><text x="20" y="16" fill="#1c1917" font-weight="500">SentimentAgent v1.9</text><text x="240" y="16">460</text><text x="340" y="16">340</text><text x="440" y="16">47</text><text x="530" y="16" font-weight="600">847</text><text x="620" y="16">$0.03</text><rect x="702" y="4" width="70" height="16" rx="8" fill="#fefce8"/><text x="737" y="16" text-anchor="middle" font-size="8" fill="#a16207">Average</text><line x1="16" y1="30" x2="804" y2="30" stroke="#f5f5f4"/></g>
      <g transform="translate(0,150)"><text x="20" y="16" fill="#1c1917" font-weight="500">VerifierNode v3.0</text><text x="240" y="16">280</text><text x="340" y="16">320</text><text x="440" y="16">40</text><text x="530" y="16" font-weight="600">640</text><text x="620" y="16">$0.02</text><rect x="702" y="4" width="70" height="16" rx="8" fill="#ecfdf5"/><text x="737" y="16" text-anchor="middle" font-size="8" fill="#047857">Efficient</text><line x1="16" y1="30" x2="804" y2="30" stroke="#f5f5f4"/></g>
      <g transform="translate(0,188)"><text x="20" y="16" fill="#1c1917" font-weight="500">CustomReportAgent</text><text x="240" y="16">580</text><text x="340" y="16">540</text><text x="440" y="16">80</text><text x="530" y="16" font-weight="600" fill="#dc2626">1,200</text><text x="620" y="16" fill="#dc2626">$0.05</text><rect x="702" y="4" width="70" height="16" rx="8" fill="#fef2f2"/><text x="737" y="16" text-anchor="middle" font-size="8" fill="#dc2626">Costly</text></g>
    </g>
    <text x="20" y="264" font-size="10" fill="#a8a29e">→ Suggest using CommonReportAgent v2.2 instead (−42% tokens, same quality).</text>
  </g>

  <!-- Budget + savings panel -->
  <g transform="translate(880,540)">
    <rect width="480" height="132" rx="14" fill="#fff" stroke="#e7e5e4" filter="url(#sh)"/>
    <text x="20" y="30" font-size="14" font-weight="600" fill="#1c1917">Budget &amp; Alerts</text>
    <g transform="translate(20,44)" font-size="10" fill="#57534e">
      <text x="0" y="14">Monthly budget</text><text x="440" y="14" text-anchor="end" fill="#1c1917">$1,247 / $2,000</text>
      <rect y="22" width="440" height="10" rx="5" fill="#f5f5f4"/><rect y="22" width="274" height="10" rx="5" fill="#4f46e5"/>
      <text x="0" y="52">Alert threshold</text><text x="440" y="52" text-anchor="end" fill="#b45309">$1,600 (80%)</text>
      <text x="0" y="74" fill="#059669">Projected end-of-month: $1,540 (within budget)</text>
    </g>
  </g>
  <g transform="translate(880,692)">
    <rect width="480" height="128" rx="14" fill="#ecfdf5" stroke="#a7f3d0" filter="url(#sh)"/>
    <text x="20" y="30" font-size="14" font-weight="600" fill="#047857">Commons Savings Impact</text>
    <g transform="translate(20,44)" font-size="11" fill="#57534e">
      <text x="0" y="14">Saved this month by using commons</text><text x="440" y="14" text-anchor="end" font-size="18" font-weight="700" fill="#059669">$412</text>
      <text x="0" y="38">Token efficiency gain from commons</text><text x="440" y="38" text-anchor="end" fill="#059669">+34%</text>
      <text x="0" y="62">If all custom → commons-equivalent</text><text x="440" y="62" text-anchor="end" fill="#059669">est. +$180 more</text>
    </g>
    <text x="20" y="116" font-size="9" fill="#047857">Upgrade CustomReportAgent → CommonReportAgent v2.2 to realize additional savings.</text>
  </g>
</svg>
