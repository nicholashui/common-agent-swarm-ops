      <rect x="20" y="106" width="120" height="28" rx="14" fill="#fff" stroke="#e7e5e4"/><text x="80" y="124" text-anchor="middle" font-size="11" fill="#57534e">Test connection</text>
      <rect x="150" y="106" width="90" height="28" rx="14" fill="#fff" stroke="#e7e5e4"/><text x="195" y="124" text-anchor="middle" font-size="11" fill="#57534e">Fetch models</text>
    </g>
