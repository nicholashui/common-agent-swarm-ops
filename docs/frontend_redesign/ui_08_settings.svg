      <text x="72" y="38" font-size="14" font-weight="600" fill="#1c1917">OpenAI</text>
      <rect x="72" y="46" width="96" height="20" rx="10" fill="#ecfdf5" stroke="#a7f3d0"/><circle cx="86" cy="56" r="3.5" fill="#10b981"/><text x="96" y="60" font-size="10" fill="#047857">Connected</text>
