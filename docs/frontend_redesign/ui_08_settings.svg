  <text x="40" y="98" font-size="24" font-weight="700" fill="#1c1917">Global Settings &amp; Configuration</text>
  <text x="40" y="120" font-size="13" fill="#78716c">Self-hosted control center · policy-approved defaults · impact-aware changes.</text>

