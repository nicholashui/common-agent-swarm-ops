      <g transform="translate(0,84)"><circle cx="34" cy="12" r="12" fill="#f5f5f4"/><text x="34" y="16" text-anchor="middle" font-size="10" fill="#57534e">AL</text><text x="56" y="16" fill="#1c1917" font-weight="500">Ava Lin</text><rect x="400" y="2" width="86" height="18" rx="9" fill="#eef2ff" stroke="#c7d2fe"/><text x="443" y="15" text-anchor="middle" font-size="9" fill="#4f46e5">Maintainer</text><text x="700" y="16">Trading, Content</text><text x="960" y="16" fill="#4f46e5">Manage</text></g>
      <rect x="20" y="116" width="150" height="26" rx="13" fill="#1c1917"/><text x="95" y="133" text-anchor="middle" font-size="11" fill="#fff">+ Invite member</text>
