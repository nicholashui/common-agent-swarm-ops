  <!-- CONTENT: Providers -->
  <g transform="translate(312,144)">
    <text x="0" y="14" font-size="16" font-weight="600" fill="#1c1917">LLM Providers &amp; Models</text>
    <text x="0" y="34" font-size="11" fill="#78716c">Configure providers, fetch models, test connections. Secrets stay server-side.</text>

