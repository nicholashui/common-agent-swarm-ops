    </g>

    <!-- Secrets vault preview -->
    <text x="0" y="248" font-size="16" font-weight="600" fill="#1c1917">Credentials &amp; Secrets Vault</text>
    <g transform="translate(0,264)">
      <rect width="1088" height="150" rx="14" fill="#fff" stroke="#e7e5e4" filter="url(#sh)"/>
      <g font-size="10" fill="#a8a29e"><text x="20" y="28">NAME</text><text x="320" y="28">SCOPE</text><text x="560" y="28">VALUE</text><text x="800" y="28">ADDED</text><text x="960" y="28">ACTIONS</text></g>
      <line x1="16" y1="36" x2="1072" y2="36" stroke="#f5f5f4"/>
      <g font-size="11" fill="#44403c">
        <g transform="translate(0,46)"><text x="20" y="16" fill="#1c1917" font-weight="500">XAI_API_KEY</text><text x="320" y="16">Global</text><text x="560" y="16" font-family="ui-monospace,monospace" fill="#a8a29e">•••••••• (hidden)</text><text x="800" y="16">2026-06-01</text><text x="960" y="16" fill="#4f46e5">Reveal · Rotate</text><line x1="16" y1="30" x2="1072" y2="30" stroke="#f5f5f4"/></g>
        <g transform="translate(0,84)"><text x="20" y="16" fill="#1c1917" font-weight="500">STRAPI_TOKEN</text><text x="320" y="16">Trading Lab</text><text x="560" y="16" font-family="ui-monospace,monospace" fill="#a8a29e">•••••••• (hidden)</text><text x="800" y="16">2026-06-14</text><text x="960" y="16" fill="#4f46e5">Reveal · Rotate</text></g>
      </g>
      <text x="20" y="140" font-size="10" fill="#a8a29e">Values never shown to browser after save · reveal is audit-logged · never stored plaintext client-side.</text>
    </g>

