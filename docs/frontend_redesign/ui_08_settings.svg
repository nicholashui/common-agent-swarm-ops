      <rect x="20" y="20" width="40" height="40" rx="11" fill="#f5f5f4"/><text x="40" y="46" text-anchor="middle" font-size="14">⧉</text>
      <text x="72" y="38" font-size="14" font-weight="600" fill="#1c1917">Local / Ollama</text>
