        <rect x="60" width="40" height="36" rx="8" fill="#eef2ff" stroke="#c7d2fe"/><text x="80" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="#4f46e5">B</text>
        <rect x="120" width="40" height="36" rx="8" fill="#eef2ff" stroke="#c7d2fe"/><text x="140" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="#4f46e5">C</text>
        <path d="M160 18h40" stroke="#d6d3d1" stroke-width="1.4"/>
        <rect x="200" width="60" height="36" rx="8" fill="#ecfdf5" stroke="#a7f3d0"/><text x="230" y="22" text-anchor="middle" font-size="10" fill="#059669">Verify</text>
        <path d="M260 24c30 18 30 -30 0 -12" stroke="#10b981" fill="none" stroke-dasharray="3 2"/>
        <text x="290" y="14" font-size="9" fill="#78716c">BIG ROWs → verifier cycle ↺</text>
      </g>
      <text x="16" y="158" font-size="10" fill="#78716c">Independent sub-swarms in parallel; final verifier loop for quality.</text>
      <text x="16" y="176" font-size="10" fill="#059669">94% success · 1.2k runs · used in 312 swarms</text>
      <rect x="392" y="158" width="70" height="24" rx="12" fill="#1c1917"/><text x="427" y="174" text-anchor="middle" font-size="10" fill="#fff">Instantiate</text>
      <rect x="468" y="158" width="60" height="24" rx="12" fill="#fff" stroke="#e7e5e4"/><text x="498" y="174" text-anchor="middle" font-size="10" fill="#57534e">Fork</text>
    </g>

    <!-- Pattern card 2 -->
    <g transform="translate(20,328)">
      <rect width="262" height="180" rx="14" fill="#fff" stroke="#e7e5e4"/>
      <text x="16" y="30" font-size="18" fill="#059669">↻</text>
      <text x="42" y="30" font-size="13" font-weight="600" fill="#1c1917">Verification Loop</text>
      <rect x="16" y="44" width="230" height="56" rx="8" fill="#fafaf9" stroke="#e7e5e4"/>
      <rect x="34" y="58" width="46" height="28" rx="6" fill="#f5f5f4" stroke="#e7e5e4"/><text x="57" y="76" text-anchor="middle" font-size="9" fill="#78716c">Agent</text>
      <path d="M84 72h24" stroke="#d6d3d1"/>
      <rect x="112" y="58" width="50" height="28" rx="6" fill="#ecfdf5" stroke="#a7f3d0"/><text x="137" y="76" text-anchor="middle" font-size="9" fill="#059669">Verify</text>
      <text x="176" y="76" font-size="16" fill="#10b981">↺</text>
      <text x="16" y="122" font-size="10" fill="#78716c">Iterative refine until quality passes.</text>
      <text x="16" y="140" font-size="10" fill="#059669">97% · 189 swarms</text>
      <rect x="16" y="150" width="70" height="22" rx="11" fill="#047857"/><text x="51" y="165" text-anchor="middle" font-size="10" fill="#fff">Instantiate</text>
    </g>
    <!-- Pattern card 3 -->
    <g transform="translate(302,328)">
      <rect width="262" height="180" rx="14" fill="#fff" stroke="#e7e5e4"/>
      <text x="16" y="30" font-size="16" fill="#7c3aed">◇</text>
      <text x="40" y="30" font-size="13" font-weight="600" fill="#1c1917">Dynamic Router Graph</text>
      <rect x="16" y="44" width="230" height="56" rx="8" fill="#fafaf9" stroke="#e7e5e4"/>
      <rect x="40" y="58" width="28" height="28" rx="6" fill="#f5f3ff" stroke="#ddd6fe" transform="rotate(45 54 72)"/><text x="54" y="76" text-anchor="middle" font-size="10" fill="#7c3aed">◇</text>
      <rect x="120" y="52" width="46" height="18" rx="6" fill="#f5f5f4"/><text x="143" y="65" text-anchor="middle" font-size="8" fill="#78716c">→ B1</text>
      <rect x="120" y="76" width="46" height="18" rx="6" fill="#f5f5f4"/><text x="143" y="89" text-anchor="middle" font-size="8" fill="#78716c">→ B2</text>
      <text x="16" y="122" font-size="10" fill="#78716c">LLM router picks next node at runtime.</text>
      <text x="16" y="140" font-size="10" fill="#059669">89% · 112 swarms</text>
      <rect x="16" y="150" width="70" height="22" rx="11" fill="#7c3aed"/><text x="51" y="165" text-anchor="middle" font-size="10" fill="#fff">Instantiate</text>
    </g>

    <!-- preview + summary panel -->
    <g transform="translate(20,524)">
      <rect width="544" height="128" rx="14" fill="#fff" stroke="#e7e5e4"/>
      <text x="16" y="26" font-size="12" font-weight="600" fill="#1c1917">Live Preview — Parallel + Verification v1.4</text>
      <rect x="16" y="36" width="330" height="76" rx="10" fill="#fafaf9" stroke="#e7e5e4"/>
      <g transform="translate(40,52)"><rect width="36" height="30" rx="7" fill="#eef2ff" stroke="#c7d2fe"/><rect x="52" width="36" height="30" rx="7" fill="#eef2ff" stroke="#c7d2fe"/><rect x="104" width="36" height="30" rx="7" fill="#eef2ff" stroke="#c7d2fe"/><path d="M140 15h30" stroke="#d6d3d1"/><rect x="170" width="46" height="30" rx="7" fill="#ecfdf5" stroke="#a7f3d0"/><path d="M216 20c26 16 26-26 0-10" stroke="#10b981" fill="none" stroke-dasharray="3 2"/></g>
      <g transform="translate(362,40)" font-size="10" fill="#57534e">
        <text x="0" y="12">Total agents / slots: 4</text>
        <text x="0" y="30">Parallelism factor: 3</text>
        <text x="0" y="48">Est. cost/latency: $0.14/min · 42s</text>
        <text x="0" y="66" fill="#059669">Verification coverage: full</text>
      </g>
    </g>
    <!-- suggest new -->
    <rect x="20" y="668" width="544" height="40" rx="12" fill="#f5f3ff" stroke="#ddd6fe"/>
    <text x="292" y="693" text-anchor="middle" font-size="12" fill="#7c3aed">✧ Suggest new Common Pattern from my goal</text>
    <text x="20" y="740" font-size="10" fill="#a8a29e">Graph JSON handoff includes linked_common_pattern_id + pinned agent versions + BIG ROW layout.</text>
    <text x="20" y="760" font-size="10" fill="#a8a29e">Suggestions are inert data · "Load into Canvas" is a server-authorized action reference.</text>
  </g>
</svg>
