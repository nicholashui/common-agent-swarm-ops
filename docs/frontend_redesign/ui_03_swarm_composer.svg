  <!-- ===== RIGHT: Common Pattern Browser ===== -->
  <g transform="translate(816,136)">
    <rect width="584" height="824" rx="16" fill="#fafaf9" stroke="#e7e5e4"/>
    <text x="20" y="34" font-size="14" font-weight="600" fill="#1c1917">Common Pattern Browser</text>
    <!-- search -->
