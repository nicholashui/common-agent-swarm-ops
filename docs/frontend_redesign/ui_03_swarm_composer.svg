      <rect width="544" height="188" rx="14" fill="#fff" stroke="#c7d2fe" filter="url(#sh)"/>
      <rect x="16" y="14" width="80" height="20" rx="10" fill="#eef2ff" stroke="#c7d2fe"/><text x="56" y="28" text-anchor="middle" font-size="9" fill="#4f46e5">Recommended</text>
      <text x="16" y="58" font-size="14" font-weight="600" fill="#1c1917">Parallel Independent + Verification</text>
      <rect x="360" y="46" width="52" height="18" rx="9" fill="#f5f5f4"/><text x="386" y="59" text-anchor="middle" font-size="9" fill="#78716c">v1.4</text>
      <!-- mini graph preview: BIG ROWs -->
