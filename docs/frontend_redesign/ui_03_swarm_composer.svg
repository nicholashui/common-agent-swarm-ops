    <g transform="translate(0,716)" font-size="10" fill="#57534e">
      <rect x="16" y="0" width="180" height="26" rx="13" fill="#f5f5f4" stroke="#e7e5e4"/><text x="30" y="17">Daily market intelligence</text>
      <rect x="204" y="0" width="200" height="26" rx="13" fill="#f5f5f4" stroke="#e7e5e4"/><text x="218" y="17">YouTube wuxia cinematic pipeline</text>
      <rect x="412" y="0" width="170" height="26" rx="13" fill="#f5f5f4" stroke="#e7e5e4"/><text x="426" y="17">DSE ICT adaptive tutor</text>
      <rect x="590" y="0" width="154" height="26" rx="13" fill="#f5f5f4" stroke="#e7e5e4"/><text x="604" y="17">Moltbot distributed</text>
    </g>
    <!-- input -->
    <rect x="16" y="754" width="728" height="54" rx="14" fill="#fafaf9" stroke="#e7e5e4"/>
    <text x="34" y="785" font-size="12" fill="#a8a29e">Describe your goal (EN / 繁體中文)… ⌘↵ to send</text>
    <path d="M690 770h6M690 775v6" stroke="#a8a29e"/>
    <rect x="700" y="768" width="30" height="26" rx="13" fill="#4f46e5"/><path d="M710 781l6-4-6-4v3l-4 1 4 1z" fill="#fff"/>
