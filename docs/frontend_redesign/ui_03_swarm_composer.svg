<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="1000" viewBox="0 0 1440 1000" font-family="Inter, system-ui, sans-serif">
  <defs><filter id="sh" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#1c1917" flood-opacity="0.06"/></filter></defs>
  <rect width="1440" height="1000" fill="#ffffff"/>

  <!-- HEADER -->
  <rect width="1440" height="56" fill="#fff"/><line x1="0" y1="56" x2="1440" y2="56" stroke="#e7e5e4"/>
  <rect x="24" y="15" width="26" height="26" rx="8" fill="#4f46e5"/><g stroke="#fff" stroke-width="1.4" fill="none"><circle cx="37" cy="24" r="1.9"/><circle cx="31" cy="34" r="1.9"/><circle cx="43" cy="34" r="1.9"/><path d="M37 26l-6 7M37 26l6 7M31.6 34h10.8"/></g>
  <rect x="72" y="14" width="150" height="28" rx="8" fill="#fafaf9" stroke="#e7e5e4"/><circle cx="88" cy="28" r="4" fill="#4f46e5"/><text x="100" y="32" font-size="12" fill="#44403c">Trading Lab</text>
  <!-- swarm name input -->
  <rect x="236" y="14" width="330" height="28" rx="8" fill="#fff" stroke="#e7e5e4"/><text x="250" y="32" font-size="12" fill="#57534e">Untitled Swarm from Parallel + Verification</text>
  <path d="M552 24l-3 3 3 3" stroke="#a8a29e" fill="none"/>
  <rect x="1180" y="14" width="96" height="28" rx="14" fill="#fff" stroke="#e7e5e4"/><text x="1228" y="32" text-anchor="middle" font-size="11" fill="#57534e">Save Draft</text>
  <rect x="1284" y="14" width="88" height="28" rx="14" fill="#fff" stroke="#e7e5e4"/><text x="1328" y="32" text-anchor="middle" font-size="11" fill="#57534e">Load Template</text>
  <text x="1404" y="33" text-anchor="middle" font-size="16" fill="#a8a29e">✕</text>

  <!-- title -->
  <text x="40" y="94" font-size="24" font-weight="700" fill="#1c1917">Swarm Composer</text>
  <text x="40" y="116" font-size="13" fill="#78716c">Turn goals into Common Pattern + Common Agent compositions — pattern-first, NL-driven.</text>

  <!-- ===== LEFT: Chat Composer ===== -->
  <g transform="translate(40,136)">
    <rect width="760" height="824" rx="16" fill="#fff" stroke="#e7e5e4" filter="url(#sh)"/>
    <!-- system banner -->
    <rect x="16" y="16" width="728" height="40" rx="10" fill="#eef2ff" stroke="#c7d2fe"/>
    <circle cx="36" cy="36" r="8" fill="#4f46e5"/><path d="M33 36l2 2 4-4" stroke="#fff" stroke-width="1.4" fill="none"/>
    <text x="52" y="33" font-size="11" font-weight="600" fill="#4338ca">Common Swarm Architect</text>
    <text x="52" y="47" font-size="10" fill="#6366f1">Recommends from Registry · prioritizes verification, parallelism, token efficiency</text>
    <text x="726" y="41" text-anchor="end" font-size="12" fill="#818cf8">⌄</text>

    <!-- user msg -->
    <g transform="translate(0,72)">
      <rect x="360" y="0" width="384" height="52" rx="12" fill="#1c1917"/>
      <text x="380" y="24" font-size="12" fill="#fff">Build a daily market intelligence swarm</text>
      <text x="380" y="42" font-size="12" fill="#fff">with a report-quality verification loop.</text>
    </g>

    <!-- assistant structured msg -->
    <g transform="translate(0,140)">
      <circle cx="30" cy="16" r="12" fill="#eef2ff" stroke="#c7d2fe"/><text x="30" y="20" text-anchor="middle" font-size="10" fill="#4f46e5">AI</text>
      <rect x="52" y="0" width="640" height="300" rx="12" fill="#fafaf9" stroke="#e7e5e4"/>
      <text x="72" y="26" font-size="12" fill="#44403c">Recommended starting Common Pattern:</text>
      <!-- rec pattern card -->
      <rect x="72" y="38" width="600" height="72" rx="10" fill="#fff" stroke="#c7d2fe"/>
      <rect x="88" y="54" width="40" height="40" rx="10" fill="#eef2ff"/><text x="108" y="80" text-anchor="middle" font-size="18" fill="#4f46e5">⊞</text>
      <text x="140" y="62" font-size="13" font-weight="600" fill="#1c1917">Parallel Independent + Verification Loop v1.4</text>
      <rect x="470" y="48" width="132" height="20" rx="10" fill="#eef2ff" stroke="#c7d2fe"/><text x="536" y="62" text-anchor="middle" font-size="9" fill="#4f46e5">Recommended for goal</text>
      <text x="140" y="82" font-size="10" fill="#78716c">Independent branches benefit from parallel; final verifier cuts hallucinations.</text>
      <text x="140" y="98" font-size="10" fill="#059669">Est. 23% token saving vs sequential · 94% success · 1.2k runs</text>
      <!-- agent slots -->
      <text x="72" y="134" font-size="11" font-weight="600" fill="#57534e">Suggested Common Agent slots</text>
      <g font-size="10" fill="#44403c">
        <rect x="72" y="142" width="192" height="28" rx="8" fill="#fff" stroke="#e7e5e4"/><circle cx="88" cy="156" r="4" fill="#4f46e5"/><text x="98" y="160">DataFetcher · Common v2.1</text>
        <rect x="276" y="142" width="192" height="28" rx="8" fill="#fff" stroke="#e7e5e4"/><circle cx="292" cy="156" r="4" fill="#4f46e5"/><text x="302" y="160">SentimentAgent · v1.9</text>
        <rect x="480" y="142" width="192" height="28" rx="8" fill="#fff" stroke="#e7e5e4"/><circle cx="496" cy="156" r="4" fill="#4f46e5"/><text x="506" y="160">MarketPredictor · v2.0</text>
        <rect x="72" y="176" width="192" height="28" rx="8" fill="#fff" stroke="#a7f3d0"/><circle cx="88" cy="190" r="4" fill="#10b981"/><text x="98" y="194">VerifierNode · v3.0</text>
      </g>
      <!-- CTA -->
      <rect x="72" y="222" width="188" height="34" rx="17" fill="#1c1917"/><text x="166" y="244" text-anchor="middle" font-size="12" fill="#fff" font-weight="500">Load into Canvas →</text>
      <rect x="270" y="222" width="150" height="34" rx="17" fill="#fff" stroke="#e7e5e4"/><text x="345" y="244" text-anchor="middle" font-size="12" fill="#57534e">Fork &amp; Customize</text>
      <rect x="430" y="222" width="180" height="34" rx="17" fill="#fff" stroke="#ddd6fe"/><text x="520" y="244" text-anchor="middle" font-size="12" fill="#7c3aed">Propose as new Pattern</text>
      <text x="72" y="284" font-size="10" fill="#a8a29e">Iterate: "make verification stricter", "use cheaper models for data agents"…</text>
