    <circle cx="40" cy="63" r="5" fill="none" stroke="#a8a29e" stroke-width="1.4"/><path d="M44 67l3 3" stroke="#a8a29e" stroke-width="1.4"/>
    <text x="56" y="67" font-size="11" fill="#a8a29e">Search patterns…</text>
    <!-- filters -->
