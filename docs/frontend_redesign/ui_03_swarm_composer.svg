      <rect x="80" width="80" height="22" rx="11" fill="#fff" stroke="#e7e5e4"/><text x="120" y="15" text-anchor="middle">Parallelism</text>
      <rect x="168" width="92" height="22" rx="11" fill="#fff" stroke="#e7e5e4"/><text x="214" y="15" text-anchor="middle">Verification</text>
      <rect x="268" width="70" height="22" rx="11" fill="#fff" stroke="#e7e5e4"/><text x="303" y="15" text-anchor="middle">Cost tier</text>
