<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="1000" viewBox="0 0 1440 1000" font-family="Inter, system-ui, sans-serif">
  <defs><filter id="sh" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#1c1917" flood-opacity="0.06"/></filter></defs>
  <rect width="1440" height="1000" fill="#ffffff"/>
  <!-- HEADER -->
  <rect width="1440" height="56" fill="#fff"/><line x1="0" y1="56" x2="1440" y2="56" stroke="#e7e5e4"/>
  <rect x="24" y="15" width="26" height="26" rx="8" fill="#4f46e5"/><g stroke="#fff" stroke-width="1.4" fill="none"><circle cx="37" cy="24" r="1.9"/><circle cx="31" cy="34" r="1.9"/><circle cx="43" cy="34" r="1.9"/><path d="M37 26l-6 7M37 26l6 7M31.6 34h10.8"/></g>
  <text x="60" y="33" font-size="12" fill="#a8a29e">Notifications</text>
  <circle cx="1360" cy="28" r="14" fill="#eef2ff" stroke="#c7d2fe"/><path d="M1360 21c-3 0-4 2-4 5v3l-1 2h10l-1-2v-3c0-3-1-5-4-5z" fill="none" stroke="#4f46e5" stroke-width="1.3"/><circle cx="1368" cy="21" r="5" fill="#ef4444"/><text x="1368" y="24" text-anchor="middle" font-size="7" fill="#fff" font-weight="700">7</text>
  <circle cx="1404" cy="28" r="15" fill="#eef2ff" stroke="#c7d2fe"/><text x="1404" y="32" text-anchor="middle" font-size="12" font-weight="600" fill="#4f46e5">NH</text>

  <text x="40" y="94" font-size="24" font-weight="700" fill="#1c1917">Notifications Center</text>
  <text x="40" y="116" font-size="13" fill="#78716c">Actionable, centralized alerts · redacted summaries with server-authorized deep links.</text>

  <!-- filter tabs -->
  <g transform="translate(40,134)" font-size="11">
    <rect width="80" height="28" rx="14" fill="#1c1917"/><text x="40" y="18" text-anchor="middle" fill="#fff">All (7)</text>
    <rect x="90" width="90" height="28" rx="14" fill="#fff" stroke="#e7e5e4"/><text x="135" y="18" text-anchor="middle" fill="#57534e">Proposals</text>
    <rect x="190" width="90" height="28" rx="14" fill="#fff" stroke="#e7e5e4"/><text x="235" y="18" text-anchor="middle" fill="#57534e">Rollouts</text>
    <rect x="290" width="80" height="28" rx="14" fill="#fff" stroke="#e7e5e4"/><text x="330" y="18" text-anchor="middle" fill="#57534e">Gates</text>
    <rect x="380" width="90" height="28" rx="14" fill="#fff" stroke="#e7e5e4"/><text x="425" y="18" text-anchor="middle" fill="#57534e">Anomalies</text>
    <text x="900" y="18" font-size="11" fill="#4f46e5">Mark all read</text>
    <text x="1010" y="18" font-size="11" fill="#57534e">Group by ▾</text>
  </g>

  <!-- Main list -->
  <g transform="translate(40,178)">
    <!-- group header -->
    <text x="0" y="14" font-size="11" font-weight="700" letter-spacing="1" fill="#a8a29e">TODAY · HIGH PRIORITY</text>
    <!-- approval gate -->
    <g transform="translate(0,26)">
      <rect width="960" height="92" rx="14" fill="#fff" stroke="#fde68a" filter="url(#sh)"/>
      <rect width="5" height="92" rx="2.5" fill="#f59e0b"/>
      <rect x="20" y="20" width="40" height="40" rx="12" fill="#fffbeb"/><path d="M40 32v16M32 40h16" stroke="#d97706" stroke-width="1.6"/>
      <text x="72" y="34" font-size="13" font-weight="600" fill="#1c1917">Approval gate ready · ReportAgent v3.0 rollout</text>
      <rect x="520" y="20" width="70" height="20" rx="10" fill="#fffbeb" stroke="#fde68a"/><text x="555" y="34" text-anchor="middle" font-size="9" fill="#b45309">Expires 8m</text>
      <text x="72" y="54" font-size="11" fill="#57534e">L1 pass · L2 rubric 0.94 · GateKeeper evidence attached · affects 19 swarms.</text>
      <text x="72" y="72" font-size="9" fill="#a8a29e" font-family="ui-monospace,monospace">corr b7f2c9d0 · unread</text>
      <rect x="770" y="52" width="80" height="28" rx="14" fill="#1c1917"/><text x="810" y="70" text-anchor="middle" font-size="10" fill="#fff">Approve</text>
      <rect x="858" y="52" width="82" height="28" rx="14" fill="#fff" stroke="#e7e5e4"/><text x="899" y="70" text-anchor="middle" font-size="10" fill="#57534e">Review</text>
      <circle cx="948" cy="20" r="4" fill="#4f46e5"/>
    </g>
    <!-- anomaly -->
    <g transform="translate(0,130)">
      <rect width="960" height="92" rx="14" fill="#fff" stroke="#fecaca" filter="url(#sh)"/>
      <rect width="5" height="92" rx="2.5" fill="#ef4444"/>
      <rect x="20" y="20" width="40" height="40" rx="12" fill="#fef2f2"/><path d="M40 30l12 22H28z" fill="none" stroke="#dc2626" stroke-width="1.6"/>
      <text x="72" y="34" font-size="13" font-weight="600" fill="#1c1917">Anomaly · error spike after ReportAgent v2.1</text>
      <text x="72" y="54" font-size="11" fill="#57534e">Error rate ↑ in 3 swarms · rollback recommended.</text>
      <text x="72" y="72" font-size="9" fill="#a8a29e" font-family="ui-monospace,monospace">as_of 04:12Z · corr b7f2c9d0</text>
      <rect x="770" y="52" width="80" height="28" rx="14" fill="#dc2626"/><text x="810" y="70" text-anchor="middle" font-size="10" fill="#fff">Rollback</text>
      <rect x="858" y="52" width="82" height="28" rx="14" fill="#fff" stroke="#e7e5e4"/><text x="899" y="70" text-anchor="middle" font-size="10" fill="#57534e">Traces</text>
    </g>

    <text x="0" y="252" font-size="11" font-weight="700" letter-spacing="1" fill="#a8a29e">EARLIER TODAY</text>
    <!-- proposal -->
    <g transform="translate(0,264)">
      <rect width="960" height="76" rx="14" fill="#fff" stroke="#ddd6fe" filter="url(#sh)"/>
      <rect width="5" height="76" rx="2.5" fill="#7c3aed"/>
      <rect x="20" y="18" width="40" height="40" rx="12" fill="#f5f3ff"/><path d="M40 28l3 8 8 1-6 6 2 8-7-4-7 4 2-8-6-6 8-1z" fill="#7c3aed"/>
      <text x="72" y="32" font-size="13" font-weight="600" fill="#1c1917">New improvement proposal · CommonMarketPredictor v2.5</text>
      <text x="72" y="52" font-size="11" fill="#57534e">meta-critic assisted · +3.2% success · awaiting review.</text>
      <rect x="800" y="24" width="140" height="28" rx="14" fill="#fff" stroke="#ddd6fe"/><text x="870" y="42" text-anchor="middle" font-size="10" fill="#7c3aed">Review proposal →</text>
    </g>
    <!-- swarm failed -->
    <g transform="translate(0,352)">
      <rect width="960" height="60" rx="14" fill="#fff" stroke="#e7e5e4" filter="url(#sh)"/>
      <rect x="20" y="16" width="30" height="30" rx="9" fill="#fef2f2"/><text x="35" y="36" text-anchor="middle" font-size="12" fill="#dc2626">✕</text>
      <text x="62" y="28" font-size="12" font-weight="600" fill="#1c1917">Swarm failed · LegacyModernizer</text>
      <text x="62" y="46" font-size="10" fill="#78716c">manual_recovery_required · escalation available</text>
      <rect x="810" y="16" width="130" height="28" rx="14" fill="#fff" stroke="#e7e5e4"/><text x="875" y="34" text-anchor="middle" font-size="10" fill="#57534e">View in Canvas →</text>
    </g>
    <!-- common improved -->
    <g transform="translate(0,424)">
      <rect width="960" height="60" rx="14" fill="#fafaf9" stroke="#e7e5e4"/>
      <rect x="20" y="16" width="30" height="30" rx="9" fill="#ecfdf5"/><path d="M28 31l5 5 9-10" stroke="#059669" stroke-width="1.6" fill="none"/>
      <text x="62" y="28" font-size="12" font-weight="600" fill="#1c1917">Common improved · VerifierNode v3.0 merged</text>
      <text x="62" y="46" font-size="10" fill="#78716c">+12% pass rate · your 8 swarms can update.</text>
      <rect x="800" y="16" width="140" height="28" rx="14" fill="#1c1917"/><text x="870" y="34" text-anchor="middle" font-size="10" fill="#fff">Update to latest</text>
    </g>
  </g>

  <!-- Preferences panel -->
  <g transform="translate(1032,178)">
    <rect width="368" height="580" rx="14" fill="#fafaf9" stroke="#e7e5e4"/>
    <text x="20" y="30" font-size="14" font-weight="600" fill="#1c1917">Preferences</text>
    <text x="20" y="56" font-size="11" font-weight="600" fill="#57534e">Notify me about</text>
    <g transform="translate(20,66)" font-size="11" fill="#44403c">
      <g><text x="0" y="16">Swarm failures</text><rect x="300" y="4" width="34" height="18" rx="9" fill="#4f46e5"/><circle cx="326" cy="13" r="7" fill="#fff"/></g>
      <g transform="translate(0,32)"><text x="0" y="16">Improvement proposals</text><rect x="300" y="4" width="34" height="18" rx="9" fill="#4f46e5"/><circle cx="326" cy="13" r="7" fill="#fff"/></g>
      <g transform="translate(0,64)"><text x="0" y="16">Rollout impacts</text><rect x="300" y="4" width="34" height="18" rx="9" fill="#4f46e5"/><circle cx="326" cy="13" r="7" fill="#fff"/></g>
      <g transform="translate(0,96)"><text x="0" y="16">Cost alerts</text><rect x="300" y="4" width="34" height="18" rx="9" fill="#d6d3d1"/><circle cx="308" cy="13" r="7" fill="#fff"/></g>
      <g transform="translate(0,128)"><text x="0" y="16">Approval gates</text><rect x="300" y="4" width="34" height="18" rx="9" fill="#4f46e5"/><circle cx="326" cy="13" r="7" fill="#fff"/></g>
    </g>
    <line x1="20" y1="244" x2="348" y2="244" stroke="#e7e5e4"/>
    <text x="20" y="270" font-size="11" font-weight="600" fill="#57534e">Delivery channels</text>
    <g transform="translate(20,282)" font-size="10" fill="#57534e">
      <rect width="150" height="30" rx="8" fill="#eef2ff" stroke="#c7d2fe"/><text x="12" y="20" fill="#4f46e5">✓ In-app</text>
      <rect x="160" width="150" height="30" rx="8" fill="#eef2ff" stroke="#c7d2fe"/><text x="172" y="20" fill="#4f46e5">✓ Email</text>
      <rect y="38" width="150" height="30" rx="8" fill="#eef2ff" stroke="#c7d2fe"/><text x="12" y="58" fill="#4f46e5">✓ Telegram</text>
      <rect x="160" y="38" width="150" height="30" rx="8" fill="#fff" stroke="#e7e5e4"/><text x="172" y="58">Slack</text>
      <rect y="76" width="150" height="30" rx="8" fill="#eef2ff" stroke="#c7d2fe"/><text x="12" y="96" fill="#4f46e5">✓ PWA push</text>
    </g>
    <line x1="20" y1="416" x2="348" y2="416" stroke="#e7e5e4"/>
    <text x="20" y="442" font-size="11" font-weight="600" fill="#57534e">Quiet hours &amp; digest</text>
    <rect x="20" y="452" width="328" height="34" rx="8" fill="#fff" stroke="#e7e5e4"/><text x="34" y="474" font-size="10" fill="#57534e">22:00 – 08:00 · daily digest at 09:00</text>
    <text x="20" y="512" font-size="11" font-weight="600" fill="#57534e">Snooze</text>
    <rect x="20" y="522" width="150" height="30" rx="15" fill="#fff" stroke="#e7e5e4"/><text x="95" y="542" text-anchor="middle" font-size="10" fill="#57534e">Snooze type 24h</text>
    <text x="20" y="574" font-size="9" fill="#a8a29e">Payloads carry no approval op or secret · actions call authorized commands.</text>
  </g>
